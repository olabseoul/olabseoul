<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLAB | MEDIA FACADE & INTERACTIVE ART</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #000;
      color: #fff;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
    }

    /* ---------- HEADER ---------- */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .logo img { height: 24px; cursor: pointer; transition: transform 0.3s ease; }
    nav {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; gap: 60px;
    }
    nav a {
      text-decoration: none; color: #fff; font-weight: 600;
      font-size: 15px; letter-spacing: 1px; transition: opacity 0.3s;
    }
    nav a:hover { opacity: 0.6; }
    .contact {
      font-weight: 800; font-size: 17px; text-decoration: none;
      color: #fff; cursor: pointer; white-space: nowrap;
    }

    /* ===================================================
       MAIN SECTION — 배경 동영상 (1920×1080)
    =================================================== */
    #home {
      position: relative;
      overflow: hidden;       /* 영상이 섹션 밖으로 삐져나오지 않도록 */
    }

    /* 배경 영상: 화면을 100% 커버 */
    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      /* 1920×1080 비율을 유지하면서 viewport를 꽉 채움 */
      width: 100%;
      height: 100%;
      object-fit: cover;      /* ✅ cover — 비율 유지하며 전체 채우기 */
      object-position: center center;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

  .video-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1;
  pointer-events: none;
}

    /* 로고는 영상 + 오버레이 위 */
    .main-logo {
      position: relative;
      z-index: 2;
      display: block;
    }
    .main-logo img {
      width: 25vw;
      max-width: 480px;
      height: auto;
      object-fit: contain;
    }

    /* ---------- PAGE INDICATOR ---------- */
    .indicator {
      position: fixed; right: 40px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 12px; z-index: 5;
    }
    .indicator a {
      display: block; width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid #aaa; background-color: transparent;
      transition: background 0.3s, border 0.3s; cursor: pointer;
    }
    .indicator a:hover,
    .indicator a.active { background-color: #fff; border-color: #fff; }

    /* ---------- FOOTER ---------- */
    .footer {
      background-color: #202020; color: #888;
      font-family: "Pretendard", sans-serif; padding: 10px 80px;
    }
    .footer-logo { display: inline-block; text-decoration: none; }
    .footer-logo-img { height: 16px; display: block; transform: translateY(15px); transition: transform 0.18s ease; }
    .footer-left { padding-left: 30px; display: flex; align-items: center; }
    .footer-nav a {
      text-decoration: none; color: #ccc; font-weight: 600;
      margin-right: 40px; transition: color 0.3s; white-space: nowrap;
    }
    .footer-nav a:hover { color: #fff; }
    .footer-right .icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; margin-left: 16px; color: #bbb;
      text-decoration: none; transition: color 0.25s ease, transform 0.25s ease;
    }
    .footer-right .icon svg { width: 18px; height: 18px; display: block; fill: currentColor; }
    .footer-right .icon:hover { color: #fff; transform: scale(1.1); }
    .footer-right { display: flex; gap: 0.1px; margin-left: auto; justify-content: flex-end; }
    .footer-info { text-align: center; margin-top: 60px; font-size: 14px; color: #666; }
    .footer-contact { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 2px; }
    .footer-contact .divider { color: #bbb; }
    .email, .tel, .email2 { font-weight: 500; color: #bbb; }
    .copyright { font-size: 13px; color: #555; text-align: center; }

    /* =======================
       MOBILE ONLY
    ======================= */
    @media (max-width: 768px) {
      header { padding: 0 14px !important; height: 64px !important; }
      .logo img { height: 20px !important; }
      nav {
        position: relative !important; left: auto !important;
        transform: none !important; display: flex !important; gap: 14px !important;
      }
      nav a { font-size: 12px !important; letter-spacing: 0.5px !important; white-space: nowrap !important; }
      .contact { font-size: 12px !important; letter-spacing: 0.5px !important; }
      .indicator { display: none !important; }
      .main-logo img { width: 70vw !important; max-width: none !important; }

      .footer { padding: 14px 16px 22px !important; }
      .footer-left { padding-left: 0 !important; justify-content: flex-start !important; margin: 0 0 10px 0 !important; }
      .footer-logo-img { height: 14px !important; transform: none !important; }
      .footer-nav {
        display: flex !important; flex-wrap: wrap !important;
        gap: 10px 16px !important; margin: 6px 0 12px 0 !important;
        justify-content: flex-start !important;
      }
      .footer-nav a { margin-right: 0 !important; font-size: 12px !important; }
      .footer-right { margin-left: 0 !important; justify-content: flex-start !important; gap: 12px !important; padding: 2px 0 10px 0 !important; }
      .footer-right .icon { margin-left: 0 !important; }
      .footer-info { margin-top: 14px !important; font-size: 12px !important; text-align: left !important; }
      .footer-contact { justify-content: flex-start !important; gap: 6px 10px !important; }
      .footer a, .footer a:visited { color: inherit !important; text-decoration: none !important; }
      .copyright { margin-top: 8px !important; font-size: 11px !important; text-align: left !important; }
    }
  </style>
</head>

  <script>
	  // 모바일 배경영상 강제 재생
const bgVideo = document.querySelector('.bg-video');
if (bgVideo) {
  bgVideo.muted = true;
  bgVideo.setAttribute('playsinline', '');
  bgVideo.setAttribute('webkit-playsinline', '');
  
  // 터치/클릭 없이도 재생 시도
  const playPromise = bgVideo.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // 자동재생 실패 시 → 사용자 첫 터치에 재생
      document.addEventListener('touchstart', () => {
        bgVideo.play();
      }, { once: true });
    });
  }
}

    const sections = document.querySelectorAll("section");
    const dots = document.querySelectorAll(".indicator a");
    window.addEventListener("scroll", () => {
      let current = "";
      sections.forEach(section => {
        if (scrollY >= section.offsetTop - window.innerHeight / 2)
          current = section.getAttribute("id");
      });
      dots.forEach(dot => {
        dot.classList.remove("active");
        if (dot.getAttribute("href").replace("#","") === current)
          dot.classList.add("active");
      });
    });
  </script>
